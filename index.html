<!DOCTYPE html>
<html>
<head>
  <title>Music</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 26px;
      color: #555;
      margin-bottom: 40px;
    }

    .btn {
      background: #4a6cff;
      color: white;
      padding: 15px 35px;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      border: none;
      transition: 0.2s;
      margin: 10px;
    }

    .btn:hover {
      background: #3a55d6;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Music</h1>
  <h2>For Google Sites</h2>

  <!-- HOT PURSUIT -->
  <button class="btn" onclick="document.getElementById('song1').play()">
    Hot Pursuit
  </button>
  <audio id="song1" src="https://docs.google.com/uc?export=download&id=1DtjzxgOqMGP_LJZHOseHYFAyPlL0fVu3"></audio>

  <!-- TIMMY NATIONAL ANTHEM -->
  <button class="btn" onclick="document.getElementById('song2').play()">
    Timmy National Anthem
  </button>
  <audio id="song2" src="https://docs.google.com/uc?export=download&id=1p7V5h8ShIM2D1ePBxyf0XQZ2NvTIhRpN"></audio>

  <!-- DIRTY BIRDIES -->
  <button class="btn" onclick="document.getElementById('song3').play()">
    Dirty Birdies
  </button>
  <audio id="song3" src="https://docs.google.com/uc?export=download&id=1t4nFcbXkthovnO_VtkUnMB2QOEdtGTu4"></audio>

</body>
</html>
